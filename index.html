<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rica ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: black;
    color: #ff4d6d;
    overflow: hidden;
}

h1, h2, p {
    text-shadow: 0 0 10px #ff4d6d;
}

.screen {
    display: none;
    padding: 50px;
}
.active {
    display: block;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    background: transparent;
    color: #ff4d6d;
    border: 2px solid #ff4d6d;
    border-radius: 25px;
    box-shadow: 0 0 10px #ff4d6d;
}

img {
    width: 220px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 0 20px #ff4d6d;
    transition: opacity 1s;
}

#photoText {
    margin-top: 20px;
    font-size: 20px;
    width: 80%;
    margin: auto;
    line-height: 1.6;
}

.firework {
    position: absolute;
    font-size: 24px;
    animation: explode 1s forwards;
}
@keyframes explode {
    0% {transform:scale(0);}
    100% {transform:scale(2); opacity:0;}
}
</style>
</head>

<body>

<div style="position:fixed;width:100%;height:100%;background:radial-gradient(circle,rgba(255,77,109,0.2),black);z-index:-1;"></div>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">
<h1>Hey Rica (My Monkey) 🐒💖</h1>
<p>I made something special for you...</p>
<button onclick="nextScreen(2)">Start 💌</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">
<h2>Our Memories 📸</h2>
<img id="slideshow" src="pic1.jpg">
<p id="photoText"></p>
<button onclick="nextScreen(3)">Next ➡️</button>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="screen">
<h2>Do you like me? 😏</h2>
<button onclick="nextScreen(4)">Yes 💖</button>
<button id="noBtn" onmouseover="moveNo()">No 😂</button>
</div>

<!-- SCREEN 4 -->
<div id="screen4" class="screen">
<h2 id="message"></h2>
<button onclick="nextScreen(5)">Next 💫</button>
</div>

<!-- SCREEN 5 -->
<div id="screen5" class="screen">
<h1>Will you always be mine? 💍</h1>
<button onclick="celebrate()">YES 💖</button>
<button id="noBtn2" onmouseover="moveNo2()">No 😏</button>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// screen change
function nextScreen(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("screen"+n).classList.add("active");

if(n===2){
document.getElementById("music").play();
typeEffect(texts[0]);
}
if(n===4) startTyping();
}

// slideshow images
let images=["pic1.jpg","pic2.jpg","pic3.jpg","pic4.jpg","pic5.jpg"];

// short simple texts
let texts=[
"Rica 🐒💖\nThis smile is my favorite thing.\nIt makes my whole day better.",

"When I see you like this,\nI feel calm and happy.\nYou mean a lot to me.",

"You make everything feel easy.\nBeing with you feels right.\nI enjoy every moment with you.",

"Even small moments with you\nbecome special for me.\nI always think about you.",

"Rica 🐒💖\nI just want to be with you.\nLet’s stay together always ❤️"
];

let index=0;

// typing for slideshow
function typeEffect(text){
let el=document.getElementById("photoText");
el.innerHTML="";
let i=0;
function type(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(type,30);
}}
type();
}

// slideshow every 5 sec
setInterval(()=>{
if(document.getElementById("screen2").classList.contains("active")){
let img=document.getElementById("slideshow");
img.style.opacity=0;

setTimeout(()=>{
index=(index+1)%images.length;
img.src=images[index];
img.style.opacity=1;
typeEffect(texts[index]);
},500);

}
},5000);

// screen 4 typing
let msg="Being with you feels like home 💖";
let mi=0;

function startTyping(){
document.getElementById("message").innerHTML="";
mi=0;
typeMsg();
}
function typeMsg(){
if(mi<msg.length){
document.getElementById("message").innerHTML+=msg.charAt(mi);
mi++;
setTimeout(typeMsg,40);
}}

// funny NO buttons
function moveNo(){
let b=document.getElementById("noBtn");
b.style.position="absolute";
b.style.left=Math.random()*window.innerWidth+"px";
b.style.top=Math.random()*window.innerHeight+"px";
}
function moveNo2(){
let b=document.getElementById("noBtn2");
b.style.position="absolute";
b.style.left=Math.random()*window.innerWidth+"px";
b.style.top=Math.random()*window.innerHeight+"px";
}

// fireworks
function celebrate(){
for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="firework";
f.innerHTML="✨";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";
document.body.appendChild(f);
}
alert("You made me the happiest person 💖🥹");
}

</script>

</body>
</html>
